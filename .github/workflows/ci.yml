name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout fin-primitives (path dependency)
        run: git clone https://github.com/Mattbusel/fin-primitives.git ../fin-primitives
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout fin-primitives (path dependency)
        run: git clone https://github.com/Mattbusel/fin-primitives.git ../fin-primitives
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (deny warnings)
        run: cargo clippy --all-features -- -D warnings

  test:
    name: Test Suite (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Checkout fin-primitives (path dependency, Unix)
        if: runner.os != 'Windows'
        run: git clone https://github.com/Mattbusel/fin-primitives.git ../fin-primitives
      - name: Checkout fin-primitives (path dependency, Windows)
        if: runner.os == 'Windows'
        run: git clone https://github.com/Mattbusel/fin-primitives.git ..\fin-primitives
        shell: cmd
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --all-features
      - name: Test (debug)
        run: cargo test --all-features
      - name: Test (release -- numeric correctness at opt level)
        run: cargo test --release --all-features
      - name: Proptest with increased cases
        run: cargo test --all-features
        env:
          PROPTEST_CASES: 1000
      - name: Ensure benches compile
        run: cargo bench --no-run --all-features
      - name: Security audit
        run: |
          cargo install cargo-audit --locked
          cargo audit

  bench:
    name: Benchmarks (dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout fin-primitives (path dependency)
        run: git clone https://github.com/Mattbusel/fin-primitives.git ../fin-primitives
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Compile benchmarks
        run: cargo bench --no-run --all-features
      - name: Run benchmarks (single sample for CI timing check)
        run: cargo bench -- --sample-size 10

  doc:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout fin-primitives (path dependency)
        run: git clone https://github.com/Mattbusel/fin-primitives.git ../fin-primitives
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build docs (deny warnings)
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"

  deny:
    name: Dependency Licenses and Advisories
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout fin-primitives (path dependency)
        run: git clone https://github.com/Mattbusel/fin-primitives.git ../fin-primitives
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses advisories bans sources

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout fin-primitives (path dependency)
        run: git clone https://github.com/Mattbusel/fin-primitives.git ../fin-primitives
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked
      - name: Run coverage
        run: cargo tarpaulin --all-features --workspace --timeout 120 --out Xml
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
