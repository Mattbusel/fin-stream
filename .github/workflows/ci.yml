name: CI
on: [push, pull_request]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: fin-stream
      - uses: actions/checkout@v4
        with:
          repository: Mattbusel/fin-primitives
          path: fin-primitives
      - uses: dtolnay/rust-toolchain@stable
      - run: cd fin-stream && cargo check
