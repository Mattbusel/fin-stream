name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run every Monday at 08:00 UTC to catch newly disclosed advisories.
    - cron: '0 8 * * 1'

env:
  CARGO_TERM_COLOR: always

jobs:
  audit:
    name: cargo-audit (RustSec advisory database)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout fin-primitives (path dependency)
        run: git clone https://github.com/Mattbusel/fin-primitives.git ../fin-primitives
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo-audit
        run: cargo audit

  deny:
    name: cargo-deny (license + bans + advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout fin-primitives (path dependency)
        run: git clone https://github.com/Mattbusel/fin-primitives.git ../fin-primitives
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Run cargo-deny check
        # Run all checks: advisories, bans, licenses, sources.
        # If no deny.toml is present, cargo-deny uses built-in defaults.
        run: cargo deny check
